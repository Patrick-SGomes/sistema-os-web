<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ativar Conta - SistemaOS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #22c55e;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #16a34a;
        }
        button:disabled {
            background: #64748b;
            cursor: not-allowed;
        }
        .msg {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Ativar sua conta 🚀</h2>

    <input type="password" id="password" placeholder="Digite sua senha" required>
    <input type="password" id="confirmPassword" placeholder="Confirme sua senha" required>

    <button id="btn">Ativar Conta</button>

    <div class="msg" id="msg"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const button = document.getElementById('btn');
    const msg = document.getElementById('msg');

    // 🔥 valida token ao abrir página
    if (!token) {
        msg.innerText = "Token inválido ou ausente";
        button.disabled = true;
    }

    button.addEventListener("click", ativarConta);

    async function ativarConta() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (!password || !confirm) {
            msg.innerText = "Preencha todos os campos";
            return;
        }

        if (password !== confirm) {
            msg.innerText = "As senhas não coincidem";
            return;
        }

        try {
            // 🔥 UX PROFISSIONAL
            button.disabled = true;
            button.innerText = "Ativando...";

            const response = await fetch('https://scalable-giuliana-uninterestedly.ngrok-free.dev/auth/activate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ token, password })
            });

            if (response.ok) {
                msg.innerText = "Conta ativada com sucesso! Redirecionando...";

                setTimeout(() => {
                    window.location.href = "/login.html";
                }, 2000);

            } else {
                msg.innerText = "Token inválido ou expirado";

                // 🔥 reativa botão
                button.disabled = false;
                button.innerText = "Ativar Conta";
            }

        } catch (e) {
            msg.innerText = "Erro ao conectar com servidor";

            // 🔥 reativa botão
            button.disabled = false;
            button.innerText = "Ativar Conta";
        }
    }
</script>

</body>
</html>
